  <line x1="60" y1="137.64" x2="730" y2="137.64" stroke="#f3f4f6" stroke-width="0.5" />
  <line x1="91.767" y1="85" x2="91.767" y2="359" stroke="#d1d5db" stroke-width="0.8" />
  <line x1="236.164" y1="85" x2="236.164" y2="359" stroke="#d1d5db" stroke-width="0.8" />
