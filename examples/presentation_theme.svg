<text class="algraf-subtitle" x="60" y="52" font-family="system-ui, sans-serif" font-size="13" fill="#4b5563">Body mass and flipper length by species</text>
<text class="algraf-caption" x="744" y="488" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Source: sample penguin measurements</text>
<rect class="algraf-plot-area" x="60" y="85" width="670" height="274" fill="#ffffff" stroke="#111827" stroke-width="1" />
